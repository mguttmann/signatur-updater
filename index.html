<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>journaway – Update Signature Address</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: #f5f7fa; color: #333;
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      padding: 40px 20px;
    }
    .container { max-width: 800px; width: 100%; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #222; }
    .subtitle { font-size: 15px; color: #666; margin-bottom: 32px; line-height: 1.5; }
    .card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px; margin-bottom: 24px;
    }
    label { display: block; font-weight: 500; font-size: 14px; margin-bottom: 8px; color: #444; }
    .step-number {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 50%;
      background: #2563eb; color: #fff; font-size: 13px;
      font-weight: 700; margin-right: 8px;
    }
    textarea {
      width: 100%; min-height: 200px; border: 2px solid #e0e4ea;
      border-radius: 8px; padding: 14px;
      font-family: 'Courier New', monospace; font-size: 13px;
      line-height: 1.5; resize: vertical; transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: #2563eb; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border: none; border-radius: 8px;
      font-family: 'Roboto', Arial, sans-serif; font-size: 15px;
      font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-success:hover { background: #15803d; }
    .btn-row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    .info-box {
      background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px;
      padding: 14px 18px; font-size: 14px; color: #1e40af;
      line-height: 1.5; margin-bottom: 20px;
    }
    .change-badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 4px; font-size: 13px; font-family: 'Courier New', monospace;
    }
    .change-old { background: #fee2e2; color: #991b1b; text-decoration: line-through; }
    .change-new { background: #dcfce7; color: #166534; }
    .result-area { display: none; }
    .result-area.visible { display: block; }
    .status-msg {
      padding: 12px 18px; border-radius: 8px; font-size: 14px;
      margin-bottom: 16px; display: none;
    }
    .status-msg.success { display: block; background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .status-msg.error { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .status-msg.warning { display: block; background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; }
    .preview-frame {
      border: 2px solid #e0e4ea; border-radius: 8px;
      padding: 24px; background: #fff; margin-top: 12px;
    }
    .copied-toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333; color: #fff; padding: 12px 24px;
      border-radius: 8px; font-size: 14px; opacity: 0;
      transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 999;
    }
    .copied-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .footer { margin-top: 40px; font-size: 12px; color: #aaa; text-align: center; }
    .toggle-row {
      display: flex; align-items: center; gap: 10px; margin-top: 14px;
    }
    .toggle-label { font-size: 14px; color: #555; cursor: pointer; user-select: none; }
    .toggle-switch {
      position: relative; width: 44px; height: 24px;
      background: #ccc; border-radius: 12px; cursor: pointer;
      transition: background 0.2s; flex-shrink: 0;
    }
    .toggle-switch.active { background: #2563eb; }
    .toggle-switch::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 20px; height: 20px; background: #fff;
      border-radius: 50%; transition: transform 0.2s;
    }
    .toggle-switch.active::after { transform: translateX(20px); }
    @media (max-width: 600px) { body { padding: 20px 12px; } .card { padding: 20px; } textarea { min-height: 150px; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>journaway Signature Updater</h1>
    <p class="subtitle">We've moved! Please update your email signature with our new address.</p>
    <div class="info-box">
      <strong>What will be changed?</strong><br>
      <span class="change-badge change-old">Am alten Handelshafen 1</span>
      &rarr;
      <span class="change-badge change-new">Mühlenstr. 111</span>
      <br><br>Everything else in your signature remains unchanged.
    </div>
    <div class="card">
      <label><span class="step-number">1</span> Copy your signature from HubSpot and paste it here</label>
      <textarea id="inputSignature" placeholder="Paste your signature HTML code here..."></textarea>
      <div class="toggle-row">
        <div class="toggle-switch active" id="beautifyToggle" onclick="toggleBeautify()"></div>
        <span class="toggle-label" onclick="toggleBeautify()">Also format / beautify the HTML code</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="convertSignature()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          Update Address
        </button>
      </div>
    </div>
    <div class="status-msg" id="statusMsg"></div>
    <div class="result-area" id="resultArea">
      <div class="card">
        <label><span class="step-number">2</span> Your updated signature – copy the code and replace it in HubSpot</label>
        <textarea id="outputSignature" readonly style="background: #f9fafb;"></textarea>
        <div class="btn-row">
          <button class="btn btn-success" onclick="copyToClipboard()">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Copy Code
          </button>
        </div>
        <label style="margin-top: 24px;"><span class="step-number">3</span> Preview of your new signature</label>
        <div class="preview-frame" id="previewFrame"></div>
      </div>
    </div>
  </div>
  <div class="copied-toast" id="copiedToast">Copied!</div>
  <p class="footer">journaway GmbH &middot; Internal Tool</p>
  <script>
    const OLD_ADDRESS = 'Am alten Handelshafen 1';
    const NEW_ADDRESS = 'Mühlenstr. 111';
    let beautifyEnabled = true;

    function toggleBeautify() {
      beautifyEnabled = !beautifyEnabled;
      document.getElementById('beautifyToggle').classList.toggle('active', beautifyEnabled);
    }

    function beautifyHTML(html) {
      let src = html.trim();
      const blockTags = new Set(['table','tr','td','th','thead','tbody','tfoot','div','p','ul','ol','li','section','header','footer','nav','main']);
      const voidTags = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);

      // Tokenize
      const tokens = [];
      let pos = 0;
      while (pos < src.length) {
        const tagStart = src.indexOf('<', pos);
        if (tagStart > pos) tokens.push({ type: 'text', value: src.substring(pos, tagStart) });
        if (tagStart === -1) { if (pos < src.length) tokens.push({ type: 'text', value: src.substring(pos) }); break; }
        const tagEnd = src.indexOf('>', tagStart);
        if (tagEnd === -1) { tokens.push({ type: 'text', value: src.substring(tagStart) }); break; }
        const tag = src.substring(tagStart, tagEnd + 1);
        const nameMatch = tag.match(/^<\/?([a-zA-Z][a-zA-Z0-9]*)/);
        const tagName = nameMatch ? nameMatch[1].toLowerCase() : '';
        const isClosing = tag.startsWith('</');
        const isSelfClosing = tag.endsWith('/>') || voidTags.has(tagName);
        const isBlock = blockTags.has(tagName);
        tokens.push({ type: 'tag', value: tag, tagName, isClosing, isSelfClosing, isBlock });
        pos = tagEnd + 1;
      }

      // Check if block element contains only inline children
      function isLeafBlock(startIdx) {
        const openTag = tokens[startIdx];
        let depth = 1;
        for (let j = startIdx + 1; j < tokens.length; j++) {
          const t = tokens[j];
          if (t.type !== 'tag' || !t.isBlock) continue;
          if (!t.isClosing && !t.isSelfClosing && t.tagName === openTag.tagName) { depth++; }
          else if (t.isClosing && t.tagName === openTag.tagName) { depth--; if (depth === 0) return { isLeaf: true, endIdx: j }; }
          else { return { isLeaf: false }; }
        }
        return { isLeaf: false };
      }

      const result = [];
      let indent = 0;
      const tab = '  ';
      let currentLine = '';
      let i = 0;

      while (i < tokens.length) {
        const token = tokens[i];
        if (token.type === 'text') { currentLine += token.value; i++; continue; }
        if (token.isBlock && !token.isClosing && !token.isSelfClosing) {
          if (currentLine.trim()) { result.push(tab.repeat(indent) + currentLine.trim()); currentLine = ''; }
          const check = isLeafBlock(i);
          if (check.isLeaf) {
            let line = '';
            for (let k = i; k <= check.endIdx; k++) line += tokens[k].value;
            result.push(tab.repeat(indent) + line);
            i = check.endIdx + 1;
          } else {
            result.push(tab.repeat(indent) + token.value);
            indent++;
            i++;
          }
        } else if (token.isBlock && token.isClosing) {
          if (currentLine.trim()) { result.push(tab.repeat(indent) + currentLine.trim()); currentLine = ''; }
          indent = Math.max(0, indent - 1);
          result.push(tab.repeat(indent) + token.value);
          i++;
        } else {
          currentLine += token.value;
          i++;
        }
      }
      if (currentLine.trim()) result.push(tab.repeat(indent) + currentLine.trim());
      return result.join('\n');
    }

    function convertSignature() {
      const input = document.getElementById('inputSignature').value.trim();
      const statusMsg = document.getElementById('statusMsg');
      const resultArea = document.getElementById('resultArea');
      statusMsg.className = 'status-msg';
      resultArea.classList.remove('visible');

      if (!input) {
        statusMsg.className = 'status-msg error';
        statusMsg.textContent = 'Please paste your signature first.';
        return;
      }
      if (!input.includes(OLD_ADDRESS)) {
        statusMsg.className = 'status-msg warning';
        statusMsg.innerHTML = 'Note: The text <strong>"' + OLD_ADDRESS + '"</strong> was not found in your signature. Please check that you pasted the complete HTML code.';
        return;
      }
      if (input.includes(NEW_ADDRESS) && !input.includes(OLD_ADDRESS)) {
        statusMsg.className = 'status-msg success';
        statusMsg.textContent = 'Your signature already contains the new address. No changes needed!';
        return;
      }

      let output = input.replaceAll(OLD_ADDRESS, NEW_ADDRESS);
      if (beautifyEnabled) output = beautifyHTML(output);

      document.getElementById('outputSignature').value = output;
      document.getElementById('previewFrame').innerHTML = output;

      const extra = beautifyEnabled ? ' The HTML has also been neatly formatted.' : '';
      statusMsg.className = 'status-msg success';
      statusMsg.textContent = 'Address updated successfully!' + extra + ' Copy the code below and replace your signature in HubSpot.';

      resultArea.classList.add('visible');
      resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function copyToClipboard() {
      const output = document.getElementById('outputSignature');
      output.select(); output.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(output.value).then(() => showToast()).catch(() => { document.execCommand('copy'); showToast(); });
    }

    function showToast() {
      const toast = document.getElementById('copiedToast');
      toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
